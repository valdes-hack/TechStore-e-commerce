# ==============================================================
# CONFIGURATION DE L'APPLICATION
# ==============================================================
spring.application.name=techstore-api
server.port=8080
spring.profiles.active=dev

# ==============================================================
# CONNEXION À LA BASE DE DONNÉES MYSQL
# ==============================================================
# Remplace 'root' et le mot de passe par tes identifiants phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/techstore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# CONFIGURATION JPA / HIBERNATE
# ==============================================================
# 'update' permet à Hibernate de créer/modifier les tables automatiquement 
# sans supprimer tes données existantes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==============================================================
# SÉCURITÉ & JWT (Valeurs par défaut pour le dev)
# ==============================================================
# Cette clé doit rester secrète en production !
techstore.app.jwtSecret=votre_cle_secrete_tres_longue_pour_techstore_2025_afrique_centrale
techstore.app.jwtExpirationMs=86400000

# ==============================================================
# UPLOAD DE FICHIERS (Preuves de paiement / Images produits)
# ==============================================================
# On limite à 5MB par fichier pour économiser de la bande passante
# spring.servlet.multipart.max-file-size=5MB
# spring.servlet.multipart.max-request-size=5MB

# ==============================================================
# LOGGING (Pour voir les erreurs en détail)
# ==============================================================
# logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
springdoc.model-and-view-resolvers-enabled=false
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Empêche Swagger de crash sur les erreurs de modèles
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.writer-with-default-pretty-printer=true
# Force Swagger à ignorer les classes de la BDD qui bouclent
springdoc.packages-to-scan=com.techstore.techstore_api.controller
# Dossier où les images seront stockées (crée ce dossier à la racine de ton projet)
file.upload-dir=uploads/products
# Taille max des fichiers
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB